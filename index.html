<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Registro con Bootstrap</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card-container { width: 100%; max-width: 400px; }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="card-container">
        <!-- Formulario de Login -->
        <div class="card shadow-sm" id="login-container">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Iniciar Sesión</h3>
                <form id="login-form">
                    <div class="mb-3">
                        <label for="login-email" class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control" id="login-email" required placeholder="correo@ejemplo.com">
                    </div>
                    <div class="mb-3">
                        <label for="login-password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="login-password" required placeholder="Tu contraseña">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Entrar</button>
                </form>
                <div class="text-center mt-3">
                    <small>¿No tienes cuenta? <a href="#" id="show-register" class="text-decoration-none">Regístrate aquí</a></small>
                </div>
            </div>
        </div>

        <!-- Formulario de Registro -->
        <div class="card shadow-sm d-none" id="register-container">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Crear Cuenta</h3>
                <form id="register-form">
                    <div class="mb-3">
                        <label for="reg-name" class="form-label">Nombre Completo</label>
                        <input type="text" class="form-control" id="reg-name" required placeholder="Ej. Juan Pérez">
                    </div>
                    <div class="mb-3">
                        <label for="reg-email" class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control" id="reg-email" required placeholder="correo@ejemplo.com">
                    </div>
                    <div class="mb-3">
                        <label for="reg-password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="reg-password" required placeholder="Crea una contraseña">
                    </div>
                    <button type="submit" class="btn btn-success w-100">Registrarse</button>
                </form>
                <div class="text-center mt-3">
                    <small>¿Ya tienes cuenta? <a href="#" id="show-login" class="text-decoration-none">Inicia sesión</a></small>
                </div>
            </div>
        </div>
        
        <!-- Pantalla de Bienvenida (Dashboard) -->
        <div class="card shadow-sm d-none" id="dashboard-container">
            <div class="card-body p-4 text-center">
                <h3 class="mb-4">Bienvenido 🎉</h3>
                <p id="welcome-message" class="text-muted mb-4"></p>
                <button id="logout-btn" class="btn btn-outline-danger">Cerrar Sesión</button>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (Opcional, pero recomendado) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Nuestro script -->
    <script src="app.js"></script>
</body>
</html>
